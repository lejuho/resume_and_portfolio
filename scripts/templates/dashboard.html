<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>pcli dashboard</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: monospace; font-size: 13px; background: #1a1a1a; color: #e0e0e0;
       height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
header { background: #111; padding: 8px 16px; display: flex;
         justify-content: space-between; align-items: center; border-bottom: 1px solid #333; flex-shrink:0; }
header h1 { font-size: 14px; color: #aaa; }
#header-right { display: flex; align-items: center; gap: 12px; }
#sel-count { color: #4fc; font-weight: bold; }
#btn-new-card { background: #1a2a1a; border: 1px solid #2a4a2a; color: #4fc;
                padding: 3px 10px; font-family: monospace; font-size: 11px; cursor: pointer; }
#btn-new-card:hover { background: #1e321e; }
#main { display: flex; flex: 1; overflow: hidden; }
aside { width: 190px; padding: 10px 12px; border-right: 1px solid #333;
        overflow-y: auto; flex-shrink: 0; }
aside h3 { color: #666; font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
           margin: 12px 0 5px; padding-bottom: 3px; border-bottom: 1px solid #2a2a2a; }
aside h3:first-child { margin-top: 0; }
aside label { display: block; margin: 3px 0; cursor: pointer; line-height: 1.4; }
aside label input[type=checkbox], aside label input[type=radio] { margin-right: 5px; }
aside input[type=text] { width: 100%; background: #222; border: 1px solid #3a3a3a;
                          color: #e0e0e0; padding: 4px 6px; font-family: monospace;
                          font-size: 12px; outline: none; }
aside input[type=text]:focus { border-color: #555; }
.btn-sm { background: #222; border: 1px solid #3a3a3a; color: #bbb; padding: 4px 8px;
          font-family: monospace; font-size: 11px; cursor: pointer; width: 100%; margin-top: 4px; }
.btn-sm:hover { background: #2a2a2a; }
#card-area { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
table { width: 100%; border-collapse: collapse; table-layout: fixed; }
col.col-cb  { width: 32px; }
col.col-id  { width: 150px; }
col.col-type{ width: 90px; }
col.col-st  { width: 70px; }
col.col-dt  { width: 80px; }
col.col-ev  { width: 36px; }
col.col-edit{ width: 40px; }
th { background: #1e1e1e; color: #666; font-size: 10px; text-transform: uppercase;
     padding: 6px 8px; text-align: left; position: sticky; top: 0; z-index: 1;
     border-bottom: 1px solid #333; letter-spacing: .5px; }
td { padding: 5px 8px; border-bottom: 1px solid #1e1e1e; vertical-align: middle; overflow: hidden; }
tr:hover td { background: #1c1c1c; }
tr.sel td { background: #142214; }
.chip { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 10px; }
.hackathon { background: #2a1a4a; color: #c8a0ff; }
.project   { background: #1a2a4a; color: #80c0ff; }
.role      { background: #1a3a2a; color: #80e0b0; }
.talk      { background: #3a2a1a; color: #ffb060; }
.paper     { background: #3a1a1a; color: #ff9090; }
.award     { background: #3a2a00; color: #ffdc60; }
.writing   { background: #1a1a3a; color: #9090ff; }
.course    { background: #002a2a; color: #60dddd; }
.community { background: #2a0020; color: #ff80c0; }
.type-default { background: #2a2a2a; color: #aaa; }
.live      { background: #0d2a0d; color: #5c5; }
.draft     { background: #2a2a00; color: #aa0; }
.archived  { background: #1a1a1a; color: #666; }
#empty-state { color: #444; font-size: 12px; padding: 24px; text-align: center; }
.edit-btn { background: none; border: 1px solid #2a2a2a; color: #555; font-family: monospace;
            font-size: 10px; cursor: pointer; padding: 1px 5px; }
.edit-btn:hover { border-color: #555; color: #bbb; }
/* ── authoring panel ── */
#authoring-panel { background: #111; border-bottom: 1px solid #333; padding: 10px 16px;
                   flex-shrink: 0; }
#authoring-panel h2 { font-size: 11px; color: #aaa; margin-bottom: 8px;
                       text-transform: uppercase; letter-spacing: 1px; }
.af-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
           gap: 6px 10px; margin-bottom: 8px; }
.af-field label { font-size: 10px; color: #666; display: block; margin-bottom: 2px; }
.af-field input, .af-field select { width: 100%; background: #1a1a1a; border: 1px solid #3a3a3a;
    color: #e0e0e0; padding: 3px 6px; font-family: monospace; font-size: 12px; outline: none; }
.af-field input:focus, .af-field select:focus { border-color: #555; }
.af-field select option { background: #1a1a1a; }
#af-body-field { margin-bottom: 8px; }
#af-body-field label { font-size: 10px; color: #666; display: block; margin-bottom: 2px; }
#af-body { width: 100%; background: #1a1a1a; border: 1px solid #3a3a3a; color: #e0e0e0;
           padding: 4px 6px; font-family: monospace; font-size: 12px; height: 70px;
           resize: vertical; outline: none; }
#af-body:focus { border-color: #555; }
#af-actions { display: flex; gap: 8px; align-items: center; }
#af-save { background: #1a2a1a; border: 1px solid #2a4a2a; color: #4fc;
           padding: 4px 16px; font-family: monospace; font-size: 12px; cursor: pointer; }
#af-save:hover { background: #1e321e; }
#af-save:disabled { opacity: 0.4; cursor: default; }
#af-cancel { background: #222; border: 1px solid #3a3a3a; color: #888;
             padding: 4px 12px; font-family: monospace; font-size: 12px; cursor: pointer; }
#af-cancel:hover { color: #ccc; }
#af-status { font-size: 11px; }
.af-ok  { color: #5d5; }
.af-err { color: #e66; }
/* ── action panel ── */
#action-panel { border-top: 1px solid #333; padding: 8px 14px; background: #111; flex-shrink: 0; }
#sel-chips { display: flex; flex-wrap: wrap; gap: 4px; min-height: 22px; margin-bottom: 6px; align-items: center; }
#sel-chips .sch { display: inline-flex; align-items: center; background: #1a2a1a; border: 1px solid #2a4a2a;
                  color: #4fc; font-size: 10px; padding: 1px 4px 1px 6px; border-radius: 3px; gap: 3px; }
#sel-chips .sch button { background: none; border: none; color: #4fc; cursor: pointer; font-size: 11px;
                          padding: 0 1px; line-height: 1; opacity: 0.7; }
#sel-chips .sch button:hover { opacity: 1; }
#no-sel { color: #444; font-size: 11px; }
#build-btns { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 6px; }
#build-btns button { background: #222; border: 1px solid #3a3a3a; color: #ccc;
                      padding: 5px 14px; font-family: monospace; font-size: 12px; cursor: pointer; }
#build-btns button:hover { background: #2c2c2c; border-color: #555; }
#build-btns button:disabled { opacity: 0.4; cursor: default; }
#result-panel { display: none; }
#result-summary { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; flex-wrap: wrap; }
.result-ok  { color: #5d5; font-size: 11px; font-weight: bold; }
.result-err { color: #e66; font-size: 11px; font-weight: bold; }
#output-path-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
#output-path-row span { font-size: 11px; color: #4fc; word-break: break-all; }
.copy-btn { background: #222; border: 1px solid #3a3a3a; color: #888; padding: 2px 7px;
            font-family: monospace; font-size: 10px; cursor: pointer; flex-shrink: 0; }
.copy-btn:hover { color: #ccc; border-color: #555; }
.copy-btn.copied { color: #4fc; border-color: #2a4a2a; }
#cmd-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
#cmd-text { font-size: 10px; color: #555; word-break: break-all; flex: 1; }
details { margin-top: 2px; }
details summary { font-size: 10px; color: #555; cursor: pointer; user-select: none; }
details summary:hover { color: #888; }
#raw-log { background: #0d0d0d; border: 1px solid #2a2a2a; padding: 6px 8px; font-size: 10px;
           max-height: 110px; overflow-y: auto; white-space: pre-wrap; word-break: break-all;
           color: #777; margin-top: 4px; }
.errors { background: #200; border-left: 3px solid #600; padding: 6px 12px; margin: 8px;
          font-size: 11px; color: #f77; flex-shrink: 0; }
</style>
</head>
<body>
<header>
  <h1>pcli dashboard</h1>
  <div id="header-right">
    <button id="btn-new-card" onclick="openNew()">+ New card</button>
    <span id="sel-count">0 selected</span>
  </div>
</header>
{% if errors %}<div class="errors">{% for e in errors %}<div>&#9888; {{ e }}</div>{% endfor %}</div>{% endif %}
<div id="authoring-panel" hidden>
  <h2 id="af-title">New card</h2>
  <div class="af-grid">
    <div class="af-field">
      <label>ID (kebab-case)</label>
      <input type="text" id="af-id" placeholder="my-project">
    </div>
    <div class="af-field">
      <label>Title</label>
      <input type="text" id="af-title-field" placeholder="My Project">
    </div>
    <div class="af-field">
      <label>Type</label>
      <select id="af-type">
        <option>project</option><option>hackathon</option><option>role</option>
        <option>talk</option><option>paper</option><option>award</option>
        <option>writing</option><option>course</option><option>community</option>
      </select>
    </div>
    <div class="af-field">
      <label>Start date (YYYY-MM-DD)</label>
      <input type="text" id="af-start" placeholder="2026-01-01">
    </div>
    <div class="af-field">
      <label>Status</label>
      <select id="af-status">
        <option value="draft">draft</option>
        <option value="live">live</option>
        <option value="archived">archived</option>
      </select>
    </div>
    <div class="af-field">
      <label>Summary (≤200 chars)</label>
      <input type="text" id="af-summary" placeholder="One-line summary">
    </div>
  </div>
  <div id="af-body-field">
    <label>Narrative / body (markdown)</label>
    <textarea id="af-body" placeholder="Narrative content…"></textarea>
  </div>
  <div id="af-actions">
    <button id="af-save" onclick="saveCard()">Save</button>
    <button id="af-cancel" onclick="closeForm()">Cancel</button>
    <span id="af-status-msg"></span>
  </div>
</div>
<div id="main">
  <aside>
    <h3>Type</h3>
    <div id="type-filters"></div>
    <h3>Status</h3>
    <div id="status-filters">
      <label><input type="radio" name="st" value="all" checked> all</label>
      <label><input type="radio" name="st" value="live"> live</label>
      <label><input type="radio" name="st" value="draft"> draft</label>
      <label><input type="radio" name="st" value="archived"> archived</label>
    </div>
    <h3>Tag</h3>
    <input type="text" id="tag-filter" placeholder="web3, solana…">
    <h3>Search</h3>
    <input type="text" id="text-filter" placeholder="id / title / summary">
    <h3>Selection</h3>
    <button class="btn-sm" id="btn-sel-all">Select filtered</button>
    <button class="btn-sm" id="btn-clear">Clear selection</button>
  </aside>
  <div id="card-area">
    <table>
      <colgroup>
        <col class="col-cb"><col class="col-id"><col><col class="col-type">
        <col class="col-st"><col class="col-dt"><col class="col-ev"><col class="col-edit">
      </colgroup>
      <thead>
        <tr>
          <th><input type="checkbox" id="check-all" title="Toggle visible"></th>
          <th>ID</th><th>Title</th><th>Type</th><th>Status</th><th>Start</th>
          <th title="evidence / visuals">E/V</th><th></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div id="empty-state" style="display:none">No cards match the current filters.</div>
  </div>
</div>
<div id="action-panel">
  <div id="sel-chips"><span id="no-sel">No cards selected.</span></div>
  <div id="build-btns">
    <button onclick="build('resume',true)">Resume dry-run</button>
    <button onclick="build('portfolio',true)">Portfolio dry-run</button>
    <button onclick="build('resume',false)">Resume build</button>
    <button onclick="build('portfolio',false)">Portfolio build</button>
  </div>
  <div id="result-panel">
    <div id="result-summary"></div>
    <div id="output-path-row" style="display:none">
      <span id="output-path-text"></span>
      <button class="copy-btn" id="copy-path-btn" onclick="copyText('copy-path-btn', document.getElementById('output-path-text').textContent)">copy</button>
    </div>
    <div id="cmd-row">
      <span id="cmd-text"></span>
      <button class="copy-btn" id="copy-cmd-btn" onclick="copyText('copy-cmd-btn', document.getElementById('cmd-text').textContent)">copy</button>
    </div>
    <details id="raw-details">
      <summary>raw log</summary>
      <pre id="raw-log"></pre>
    </details>
  </div>
</div>
<script>
const ALL = {{ cards_json | safe }};
const sel = new Set();
let _editMode = null; // null = new, string = card id being edited

const allTypes = [...new Set(ALL.map(c => c.type))].sort();
const tf = document.getElementById('type-filters');
allTypes.forEach(t => {
  const l = document.createElement('label');
  l.innerHTML = `<input type="checkbox" class="tcb" value="${t}"> ${t}`;
  tf.appendChild(l);
});

function filtered() {
  const types = [...document.querySelectorAll('.tcb:checked')].map(e => e.value);
  const st = document.querySelector('input[name=st]:checked').value;
  const tag = document.getElementById('tag-filter').value.trim().toLowerCase();
  const txt = document.getElementById('text-filter').value.trim().toLowerCase();
  return ALL.filter(c => {
    if (types.length && !types.includes(c.type)) return false;
    if (st !== 'all' && c.status !== st) return false;
    if (tag) {
      const allTags = Object.values(c.tags || {}).flat().join(' ').toLowerCase();
      if (!allTags.includes(tag)) return false;
    }
    if (txt && !`${c.id} ${c.title} ${c.summary}`.toLowerCase().includes(txt)) return false;
    return true;
  });
}

function chipClass(val, pool) {
  return pool.includes(val) ? val : 'type-default';
}
const knownTypes = ['hackathon','project','role','talk','paper','award','writing','course','community'];

function render() {
  const cards = filtered();
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  const empty = document.getElementById('empty-state');
  empty.style.display = cards.length === 0 ? '' : 'none';
  cards.forEach(c => {
    const tr = document.createElement('tr');
    if (sel.has(c.id)) tr.classList.add('sel');
    const ev = `${c.evidence_count}/${c.has_visuals ? '&#10003;' : '0'}`;
    const eid = c.id.replace(/'/g, "\\'");
    tr.innerHTML =
      `<td><input type="checkbox" class="rcb" data-id="${c.id}"${sel.has(c.id) ? ' checked' : ''}></td>` +
      `<td style="font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${c.id}">${c.id}</td>` +
      `<td style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${c.title}">${c.title}</td>` +
      `<td><span class="chip ${chipClass(c.type,knownTypes)}">${c.type}</span></td>` +
      `<td><span class="chip ${c.status}">${c.status}</span></td>` +
      `<td style="color:#666;white-space:nowrap">${c.period_start||''}</td>` +
      `<td style="text-align:center;color:#555;font-size:11px">${ev}</td>` +
      `<td><button class="edit-btn" onclick="openEdit('${eid}')">edit</button></td>`;
    tbody.appendChild(tr);
  });
  document.querySelectorAll('.rcb').forEach(cb => cb.addEventListener('change', () => {
    cb.checked ? sel.add(cb.dataset.id) : sel.delete(cb.dataset.id);
    cb.closest('tr').classList.toggle('sel', cb.checked);
    updateSel();
  }));
  const vis = filtered();
  document.getElementById('check-all').checked = vis.length > 0 && vis.every(c => sel.has(c.id));
}

function updateSel() {
  const ids = [...sel];
  document.getElementById('sel-count').textContent = `${ids.length} selected`;
  const container = document.getElementById('sel-chips');
  container.innerHTML = '';
  if (ids.length === 0) {
    container.innerHTML = '<span id="no-sel">No cards selected.</span>';
  } else {
    ids.forEach(id => {
      const chip = document.createElement('span');
      chip.className = 'sch';
      const eid = id.replace(/'/g, "\\'");
      chip.innerHTML = `${id}<button title="Remove" onclick="removeCard('${eid}')">&#215;</button>`;
      container.appendChild(chip);
    });
  }
}

function removeCard(id) {
  sel.delete(id);
  render();
  updateSel();
}

// ── authoring ──────────────────────────────────────────────────────────────

function openNew() {
  _editMode = null;
  document.getElementById('af-title').textContent = 'New card';
  document.getElementById('af-id').value = '';
  document.getElementById('af-id').disabled = false;
  document.getElementById('af-title-field').value = '';
  document.getElementById('af-type').value = 'project';
  document.getElementById('af-start').value = new Date().toISOString().slice(0,10);
  document.getElementById('af-status').value = 'draft';
  document.getElementById('af-summary').value = '';
  document.getElementById('af-body').value = '';
  document.getElementById('af-status-msg').textContent = '';
  document.getElementById('authoring-panel').hidden = false;
  document.getElementById('af-id').focus();
}

async function openEdit(cardId) {
  _editMode = cardId;
  document.getElementById('af-title').textContent = `Edit: ${cardId}`;
  document.getElementById('af-id').value = cardId;
  document.getElementById('af-id').disabled = true;
  document.getElementById('af-status-msg').textContent = 'Loading…';
  document.getElementById('authoring-panel').hidden = false;
  try {
    const r = await fetch(`/api/cards/${encodeURIComponent(cardId)}`);
    const d = await r.json();
    if (!d.ok) { setAfStatus(false, d.error || 'load failed'); return; }
    const f = d.fields || {};
    document.getElementById('af-title-field').value = f.title || '';
    document.getElementById('af-type').value = f.type || 'project';
    const start = f.period && f.period.start ? f.period.start : '';
    document.getElementById('af-start').value = start;
    document.getElementById('af-status').value = f.status || 'draft';
    document.getElementById('af-summary').value = f.summary || '';
    document.getElementById('af-body').value = d.body || '';
    document.getElementById('af-status-msg').textContent = '';
  } catch(e) {
    setAfStatus(false, `Network error: ${e}`);
  }
}

function closeForm() {
  document.getElementById('authoring-panel').hidden = true;
  document.getElementById('af-status-msg').textContent = '';
  _editMode = null;
}

function setAfStatus(ok, msg) {
  const el = document.getElementById('af-status-msg');
  el.textContent = msg;
  el.className = ok ? 'af-ok' : 'af-err';
}

async function saveCard() {
  const btn = document.getElementById('af-save');
  btn.disabled = true;
  setAfStatus(false, 'Saving…');
  document.getElementById('af-status-msg').className = '';
  try {
    if (_editMode === null) {
      // create
      const body = {
        id: document.getElementById('af-id').value.trim(),
        title: document.getElementById('af-title-field').value.trim(),
        type: document.getElementById('af-type').value,
        period_start: document.getElementById('af-start').value.trim(),
        status: document.getElementById('af-status').value,
        summary: document.getElementById('af-summary').value.trim(),
      };
      const r = await fetch('/api/cards', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify(body)
      });
      const d = await r.json();
      if (d.ok) {
        setAfStatus(true, `Created ${d.path}`);
        setTimeout(() => { closeForm(); location.reload(); }, 800);
      } else {
        setAfStatus(false, d.error || 'create failed');
      }
    } else {
      // update
      const fields = {
        title: document.getElementById('af-title-field').value.trim(),
        type: document.getElementById('af-type').value,
        period: { start: document.getElementById('af-start').value.trim(), end: null },
        status: document.getElementById('af-status').value,
        summary: document.getElementById('af-summary').value.trim(),
      };
      const body = document.getElementById('af-body').value;
      const r = await fetch(`/api/cards/${encodeURIComponent(_editMode)}`, {
        method: 'PUT', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({fields, body})
      });
      const d = await r.json();
      if (d.ok) {
        setAfStatus(true, `Saved ${d.path}`);
        setTimeout(() => { closeForm(); location.reload(); }, 800);
      } else {
        setAfStatus(false, d.error || 'save failed');
      }
    }
  } catch(e) {
    setAfStatus(false, `Network error: ${e}`);
  } finally {
    btn.disabled = false;
  }
}

// ── filter / selection ────────────────────────────────────────────────────

document.querySelectorAll('.tcb,input[name=st]').forEach(e => e.addEventListener('change', render));
document.getElementById('tag-filter').addEventListener('input', render);
document.getElementById('text-filter').addEventListener('input', render);
document.getElementById('check-all').addEventListener('change', function() {
  filtered().forEach(c => this.checked ? sel.add(c.id) : sel.delete(c.id));
  render(); updateSel();
});
document.getElementById('btn-sel-all').addEventListener('click', () => {
  filtered().forEach(c => sel.add(c.id)); render(); updateSel();
});
document.getElementById('btn-clear').addEventListener('click', () => {
  sel.clear(); render(); updateSel();
});

// ── copy ─────────────────────────────────────────────────────────────────

function copyText(btnId, text) {
  const btn = document.getElementById(btnId);
  const done = () => {
    btn.textContent = 'copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'copy'; btn.classList.remove('copied'); }, 1500);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(done).catch(() => fallbackCopy(text, done));
  } else {
    fallbackCopy(text, done);
  }
}

function fallbackCopy(text, done) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try { document.execCommand('copy'); done(); } catch(e) {}
  document.body.removeChild(ta);
}

// ── build ─────────────────────────────────────────────────────────────────

async function build(target, dryRun) {
  const rp = document.getElementById('result-panel');
  const summary = document.getElementById('result-summary');
  const cmdText = document.getElementById('cmd-text');
  const rawLog = document.getElementById('raw-log');
  const pathRow = document.getElementById('output-path-row');
  const pathText = document.getElementById('output-path-text');

  rp.style.display = '';
  summary.innerHTML = '<span style="color:#666;font-size:11px">Building&#8230;</span>';
  pathRow.style.display = 'none';
  cmdText.textContent = '';
  rawLog.textContent = '';
  document.getElementById('raw-details').open = false;
  document.querySelectorAll('#build-btns button').forEach(b => b.disabled = true);

  try {
    const r = await fetch('/api/build', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({target, dry_run: dryRun, selected_ids: [...sel]})
    });
    const d = await r.json();

    const statusLabel = d.ok
      ? `<span class="result-ok">&#10003; ${d.dry_run ? 'dry-run ok' : 'build ok'}</span>`
      : `<span class="result-err">&#10007; exit ${d.exit_code}</span>`;
    const selLabel = d.selected_ids && d.selected_ids.length
      ? `<span style="color:#555;font-size:10px">${d.selected_ids.length} card(s)</span>`
      : '';
    summary.innerHTML = statusLabel + (selLabel ? ' ' + selLabel : '');

    cmdText.textContent = d.command || '';

    if (d.output_path) {
      pathText.textContent = d.output_path;
      pathRow.style.display = '';
    } else {
      pathRow.style.display = 'none';
    }

    const logParts = [d.stdout, d.stderr ? `STDERR:\n${d.stderr}` : ''].filter(Boolean);
    rawLog.textContent = logParts.join('\n');
    if (rawLog.textContent.trim()) {
      document.getElementById('raw-details').open = !d.ok;
    }
  } catch(e) {
    summary.innerHTML = `<span class="result-err">Network error: ${e}</span>`;
  } finally {
    document.querySelectorAll('#build-btns button').forEach(b => b.disabled = false);
  }
}

render(); updateSel();
</script>
</body>
</html>
