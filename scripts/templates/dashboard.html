<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>pcli dashboard</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: monospace; font-size: 13px; background: #1a1a1a; color: #e0e0e0;
       height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
header { background: #111; padding: 8px 16px; display: flex;
         justify-content: space-between; align-items: center; border-bottom: 1px solid #333; flex-shrink:0; }
header h1 { font-size: 14px; color: #aaa; }
#sel-count { color: #4fc; font-weight: bold; }
#main { display: flex; flex: 1; overflow: hidden; }
aside { width: 190px; padding: 10px 12px; border-right: 1px solid #333;
        overflow-y: auto; flex-shrink: 0; }
aside h3 { color: #666; font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
           margin: 12px 0 5px; padding-bottom: 3px; border-bottom: 1px solid #2a2a2a; }
aside h3:first-child { margin-top: 0; }
aside label { display: block; margin: 3px 0; cursor: pointer; line-height: 1.4; }
aside label input[type=checkbox], aside label input[type=radio] { margin-right: 5px; }
aside input[type=text] { width: 100%; background: #222; border: 1px solid #3a3a3a;
                          color: #e0e0e0; padding: 4px 6px; font-family: monospace;
                          font-size: 12px; outline: none; }
aside input[type=text]:focus { border-color: #555; }
.btn-sm { background: #222; border: 1px solid #3a3a3a; color: #bbb; padding: 4px 8px;
          font-family: monospace; font-size: 11px; cursor: pointer; width: 100%; margin-top: 4px; }
.btn-sm:hover { background: #2a2a2a; }
#card-area { flex: 1; overflow-y: auto; }
table { width: 100%; border-collapse: collapse; table-layout: fixed; }
col.col-cb  { width: 32px; }
col.col-id  { width: 160px; }
col.col-type{ width: 90px; }
col.col-st  { width: 70px; }
col.col-dt  { width: 80px; }
col.col-ev  { width: 36px; }
th { background: #1e1e1e; color: #666; font-size: 10px; text-transform: uppercase;
     padding: 6px 8px; text-align: left; position: sticky; top: 0; z-index: 1;
     border-bottom: 1px solid #333; letter-spacing: .5px; }
td { padding: 5px 8px; border-bottom: 1px solid #1e1e1e; vertical-align: middle; overflow: hidden; }
tr:hover td { background: #1c1c1c; }
tr.sel td { background: #142214; }
.chip { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 10px; }
.hackathon { background: #2a1a4a; color: #c8a0ff; }
.project   { background: #1a2a4a; color: #80c0ff; }
.role      { background: #1a3a2a; color: #80e0b0; }
.talk      { background: #3a2a1a; color: #ffb060; }
.paper     { background: #3a1a1a; color: #ff9090; }
.award     { background: #3a2a00; color: #ffdc60; }
.writing   { background: #1a1a3a; color: #9090ff; }
.course    { background: #002a2a; color: #60dddd; }
.community { background: #2a0020; color: #ff80c0; }
.type-default { background: #2a2a2a; color: #aaa; }
.live      { background: #0d2a0d; color: #5c5; }
.draft     { background: #2a2a00; color: #aa0; }
.archived  { background: #1a1a1a; color: #666; }
#action-panel { border-top: 1px solid #333; padding: 10px 14px; background: #111; flex-shrink: 0; }
#sel-ids { font-size: 11px; color: #4fc; margin-bottom: 8px; min-height: 16px; word-break: break-all; }
#build-btns { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
#build-btns button { background: #222; border: 1px solid #3a3a3a; color: #ccc;
                      padding: 5px 14px; font-family: monospace; font-size: 12px; cursor: pointer; }
#build-btns button:hover { background: #2c2c2c; border-color: #555; }
#build-btns button:disabled { opacity: 0.4; cursor: default; }
#output { background: #0d0d0d; border: 1px solid #2a2a2a; padding: 8px 10px; font-size: 11px;
          max-height: 130px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; display: none; }
#output.ok  { border-color: #1a3a1a; color: #5d5; }
#output.err { border-color: #3a1a1a; color: #e66; }
.errors { background: #200; border-left: 3px solid #600; padding: 6px 12px; margin: 8px;
          font-size: 11px; color: #f77; flex-shrink: 0; }
.summary-cell { color: #888; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
</style>
</head>
<body>
<header>
  <h1>pcli dashboard</h1>
  <span id="sel-count">0 selected</span>
</header>
{% if errors %}<div class="errors">{% for e in errors %}<div>⚠ {{ e }}</div>{% endfor %}</div>{% endif %}
<div id="main">
  <aside>
    <h3>Type</h3>
    <div id="type-filters"></div>
    <h3>Status</h3>
    <div id="status-filters">
      <label><input type="radio" name="st" value="all" checked> all</label>
      <label><input type="radio" name="st" value="live"> live</label>
      <label><input type="radio" name="st" value="draft"> draft</label>
      <label><input type="radio" name="st" value="archived"> archived</label>
    </div>
    <h3>Tag</h3>
    <input type="text" id="tag-filter" placeholder="web3, solana…">
    <h3>Search</h3>
    <input type="text" id="text-filter" placeholder="id / title / summary">
    <h3>Selection</h3>
    <button class="btn-sm" id="btn-sel-all">Select filtered</button>
    <button class="btn-sm" id="btn-clear">Clear selection</button>
  </aside>
  <div id="card-area">
    <table>
      <colgroup>
        <col class="col-cb"><col class="col-id"><col><col class="col-type">
        <col class="col-st"><col class="col-dt"><col class="col-ev">
      </colgroup>
      <thead>
        <tr>
          <th><input type="checkbox" id="check-all" title="Toggle visible"></th>
          <th>ID</th><th>Title</th><th>Type</th><th>Status</th><th>Start</th>
          <th title="evidence / visuals">E/V</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>
<div id="action-panel">
  <div id="sel-ids">No cards selected.</div>
  <div id="build-btns">
    <button onclick="build('resume',true)">Resume dry-run</button>
    <button onclick="build('portfolio',true)">Portfolio dry-run</button>
    <button onclick="build('resume',false)">Resume build</button>
    <button onclick="build('portfolio',false)">Portfolio build</button>
  </div>
  <pre id="output"></pre>
</div>
<script>
const ALL = {{ cards_json | safe }};
const sel = new Set();

const allTypes = [...new Set(ALL.map(c => c.type))].sort();
const tf = document.getElementById('type-filters');
allTypes.forEach(t => {
  const l = document.createElement('label');
  l.innerHTML = `<input type="checkbox" class="tcb" value="${t}"> ${t}`;
  tf.appendChild(l);
});

function filtered() {
  const types = [...document.querySelectorAll('.tcb:checked')].map(e => e.value);
  const st = document.querySelector('input[name=st]:checked').value;
  const tag = document.getElementById('tag-filter').value.trim().toLowerCase();
  const txt = document.getElementById('text-filter').value.trim().toLowerCase();
  return ALL.filter(c => {
    if (types.length && !types.includes(c.type)) return false;
    if (st !== 'all' && c.status !== st) return false;
    if (tag) {
      const allTags = Object.values(c.tags || {}).flat().join(' ').toLowerCase();
      if (!allTags.includes(tag)) return false;
    }
    if (txt && !`${c.id} ${c.title} ${c.summary}`.toLowerCase().includes(txt)) return false;
    return true;
  });
}

function chipClass(val, pool) {
  return pool.includes(val) ? val : 'type-default';
}
const knownTypes = ['hackathon','project','role','talk','paper','award','writing','course','community'];

function render() {
  const cards = filtered();
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  cards.forEach(c => {
    const tr = document.createElement('tr');
    if (sel.has(c.id)) tr.classList.add('sel');
    const ev = `${c.evidence_count}/${c.has_visuals ? '✓' : '0'}`;
    tr.innerHTML =
      `<td><input type="checkbox" class="rcb" data-id="${c.id}"${sel.has(c.id) ? ' checked' : ''}></td>` +
      `<td style="font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${c.id}">${c.id}</td>` +
      `<td style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${c.title}">${c.title}</td>` +
      `<td><span class="chip ${chipClass(c.type,knownTypes)}">${c.type}</span></td>` +
      `<td><span class="chip ${c.status}">${c.status}</span></td>` +
      `<td style="color:#666;white-space:nowrap">${c.period_start||''}</td>` +
      `<td style="text-align:center;color:#555;font-size:11px">${ev}</td>`;
    tbody.appendChild(tr);
  });
  document.querySelectorAll('.rcb').forEach(cb => cb.addEventListener('change', () => {
    cb.checked ? sel.add(cb.dataset.id) : sel.delete(cb.dataset.id);
    cb.closest('tr').classList.toggle('sel', cb.checked);
    updateSel();
  }));
  const vis = filtered();
  document.getElementById('check-all').checked = vis.length > 0 && vis.every(c => sel.has(c.id));
}

function updateSel() {
  const ids = [...sel];
  document.getElementById('sel-count').textContent = `${ids.length} selected`;
  document.getElementById('sel-ids').textContent = ids.length ? `Selected: ${ids.join(', ')}` : 'No cards selected.';
}

document.querySelectorAll('.tcb,input[name=st]').forEach(e => e.addEventListener('change', render));
document.getElementById('tag-filter').addEventListener('input', render);
document.getElementById('text-filter').addEventListener('input', render);
document.getElementById('check-all').addEventListener('change', function() {
  filtered().forEach(c => this.checked ? sel.add(c.id) : sel.delete(c.id));
  render(); updateSel();
});
document.getElementById('btn-sel-all').addEventListener('click', () => {
  filtered().forEach(c => sel.add(c.id)); render(); updateSel();
});
document.getElementById('btn-clear').addEventListener('click', () => {
  sel.clear(); render(); updateSel();
});

async function build(target, dryRun) {
  const out = document.getElementById('output');
  out.style.display = 'block'; out.className = '';
  out.textContent = `Running ${target} ${dryRun ? 'dry-run' : 'build'}…`;
  document.querySelectorAll('#build-btns button').forEach(b => b.disabled = true);
  try {
    const r = await fetch('/api/build', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({target, dry_run: dryRun, selected_ids: [...sel]})
    });
    const d = await r.json();
    out.textContent = [`$ ${d.command}`, d.stdout, d.stderr ? `STDERR:\n${d.stderr}` : ''].filter(Boolean).join('\n');
    out.className = d.ok ? 'ok' : 'err';
  } catch(e) {
    out.textContent = `Network error: ${e}`; out.className = 'err';
  } finally {
    document.querySelectorAll('#build-btns button').forEach(b => b.disabled = false);
  }
}

render(); updateSel();
</script>
</body>
</html>
