<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Workspace</title>
  <style>
    :root {
      --ws-bg: #f7f8fa;
      --ws-surface: #fff;
      --ws-text: #1a1a2e;
      --ws-text-muted: #888;
      --ws-text-secondary: #555;
      --ws-coverage-muted: #4a5568;
      --ws-accent: #4a90d9;
      --ws-accent-tint: rgba(74, 144, 217, .07);
      --ws-accent-border: rgba(74, 144, 217, .2);
      --ws-accent-hover: #3a7fc7;
      --ws-disabled: #aaa;
      --ws-input-bg: #fafafa;
      --ws-preview-bg: #f8f8ff;
      --ws-border: rgba(0, 0, 0, .08);
      --ws-border-thin: rgba(0, 0, 0, .06);
      --ws-border-strong: rgba(0, 0, 0, .12);
      --ws-radius-md: 8px;
      --ws-radius-lg: 12px;
    }
    :root[data-ws-theme="dark"] {
      --ws-bg: #0f1117;
      --ws-surface: #1a1b26;
      --ws-text: #e8e8f0;
      --ws-text-muted: #888;
      --ws-text-secondary: #a0a0b0;
      --ws-coverage-muted: #9aa5b4;
      --ws-accent: #6aa8e8;
      --ws-accent-tint: rgba(106, 168, 232, .12);
      --ws-accent-border: rgba(106, 168, 232, .3);
      --ws-accent-hover: #7ab8f0;
      --ws-disabled: #555;
      --ws-input-bg: #14151f;
      --ws-preview-bg: #12131c;
      --ws-border: rgba(255, 255, 255, .08);
      --ws-border-thin: rgba(255, 255, 255, .06);
      --ws-border-strong: rgba(255, 255, 255, .15);
    }
    @media (prefers-color-scheme: dark) {
      :root:not([data-ws-theme="light"]) {
        --ws-bg: #0f1117;
        --ws-surface: #1a1b26;
        --ws-text: #e8e8f0;
        --ws-text-muted: #888;
        --ws-text-secondary: #a0a0b0;
        --ws-coverage-muted: #9aa5b4;
        --ws-accent: #6aa8e8;
        --ws-accent-tint: rgba(106, 168, 232, .12);
        --ws-accent-border: rgba(106, 168, 232, .3);
        --ws-accent-hover: #7ab8f0;
        --ws-disabled: #555;
        --ws-input-bg: #14151f;
        --ws-preview-bg: #12131c;
        --ws-border: rgba(255, 255, 255, .08);
        --ws-border-thin: rgba(255, 255, 255, .06);
        --ws-border-strong: rgba(255, 255, 255, .15);
      }
    }
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; margin: 0; background: var(--ws-bg); color: var(--ws-text); }
    header { background: var(--ws-surface); border-bottom: 1px solid var(--ws-border); padding: 0 24px;
             height: 48px; display: flex; align-items: center; gap: 16px; }
    header strong { font-size: .95rem; }
    header a { color: var(--ws-accent); font-size: .82rem; text-decoration: none; }
    header a:hover { text-decoration: underline; }
    .ws-header-spacer { flex: 1; }
    .ws-theme-toggle { background: var(--ws-input-bg); color: var(--ws-text);
                       border: 1px solid var(--ws-border-strong);
                       border-radius: var(--ws-radius-md); padding: 5px 10px;
                       font-size: .78rem; cursor: pointer; }
    .ws-theme-toggle:hover { border-color: var(--ws-accent-border); color: var(--ws-accent); }
    .ws-theme-toggle:focus-visible { outline: 2px solid var(--ws-accent); outline-offset: 2px; }
    .ws-layout { display: grid; grid-template-columns: 320px 1fr; height: calc(100vh - 48px); }
    .ws-pane { overflow-y: auto; padding: 16px; }
    .ws-pane-left { background: var(--ws-surface); border-right: 1px solid var(--ws-border); }
    .ws-pane-right { background: var(--ws-bg); }
    .ws-pane-title { font-size: .7rem; font-weight: 500; letter-spacing: .03em;
                     color: var(--ws-text-muted); margin: 0 0 12px; }
    .ws-card-item { display: flex; align-items: flex-start; gap: 8px; padding: 8px 0;
                    min-width: 0; max-width: 100%; overflow: hidden;
                    border-bottom: 1px solid var(--ws-border-thin); font-size: .85rem;
                    transition: background .12s; }
    .ws-card-item:last-child { border-bottom: none; }
    .ws-card-item:hover { background: var(--ws-accent-tint); }
    .ws-card-item.ws-card-selected { background: var(--ws-accent-tint);
                                     border-color: var(--ws-accent-border); }
    .ws-card-item input[type="checkbox"]:focus-visible { outline: 2px solid var(--ws-accent);
                                                         outline-offset: 2px; }
    .ws-card-content { flex: 1; min-width: 0; max-width: 100%; }
    .ws-card-body { display: flex; flex-direction: column; gap: 2px; cursor: pointer;
                    min-width: 0; max-width: 100%; }
    .ws-card-pill { display: inline-block; font-size: .68rem; font-weight: 500;
                    background: var(--ws-accent-tint); color: var(--ws-accent);
                    border-radius: var(--ws-radius-md); padding: 1px 6px; margin-bottom: 2px;
                    max-width: 100%; overflow-wrap: anywhere; }
    .ws-card-title { font-weight: 500; color: var(--ws-text); font-size: .85rem;
                     max-width: 100%; overflow-wrap: anywhere; word-break: break-word; }
    .ws-card-context { display: -webkit-box; font-size: .78rem; color: var(--ws-text-secondary);
                       max-width: 100%; overflow: hidden; overflow-wrap: anywhere;
                       word-break: break-word; -webkit-box-orient: vertical;
                       -webkit-line-clamp: 2; }
    .ws-card-context.ws-card-context-expanded { display: block; overflow: visible;
                                                -webkit-line-clamp: initial; }
    .ws-card-meta { font-size: .72rem; color: var(--ws-text-muted); max-width: 100%;
                    overflow-wrap: anywhere; }
    .ws-card-more { display: flex; align-items: center; justify-content: center; gap: 6px;
                    width: 100%; min-height: 32px; margin-top: 6px; padding: 5px 8px;
                    border: 1px solid var(--ws-accent-border);
                    border-radius: var(--ws-radius-md); background: var(--ws-accent-tint);
                    color: var(--ws-accent); font: inherit; font-size: .75rem;
                    font-weight: 500; cursor: pointer; }
    .ws-card-more[hidden] { display: none; }
    .ws-card-more:hover { border-color: var(--ws-accent); background: var(--ws-input-bg); }
    .ws-card-more:focus-visible { outline: 2px solid var(--ws-accent); outline-offset: 2px; }
    .ws-empty { font-size: .83rem; color: var(--ws-disabled); font-style: italic; padding: 8px 0; }
    .ws-section { background: var(--ws-surface); border: 1px solid var(--ws-border);
                  border-radius: var(--ws-radius-lg); padding: 14px 16px; margin-bottom: 12px; }
    .ws-section h3 { font-size: .7rem; font-weight: 500; letter-spacing: .03em;
                     color: var(--ws-text-muted); margin: 0 0 10px; }
    .ws-field { margin-bottom: 10px; }
    .ws-field label { display: block; font-size: .72rem; color: var(--ws-text-muted);
                      letter-spacing: .02em; margin-bottom: 3px; }
    .ws-field input, .ws-field textarea, .ws-field select {
      width: 100%; font-size: .88rem; border: 1px solid var(--ws-border-strong);
      border-radius: var(--ws-radius-md); padding: 6px 10px; background: var(--ws-input-bg); color: var(--ws-text); }
    .ws-field textarea { resize: vertical; }
    .ws-output-row { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
    .ws-output-row label { display: flex; gap: 5px; align-items: center;
                           font-size: .85rem; cursor: pointer; }
    .ws-coverage-panel { border-radius: var(--ws-radius-md); background: var(--ws-accent-tint);
                         border: 1px solid var(--ws-accent-border); padding: 10px 14px;
                         font-size: .82rem; color: var(--ws-coverage-muted); }
    .ws-coverage-label { font-size: .7rem; font-weight: 500; letter-spacing: .03em;
                         color: var(--ws-text-muted); margin-bottom: 4px; }
    .ws-coverage-value { font-size: 1.25rem; font-weight: 500; color: var(--ws-accent); }
    .ws-coverage-gap { font-size: .78rem; color: var(--ws-text-muted); margin-top: 4px; }
    .ws-coverage-terms { font-size: .72rem; color: var(--ws-accent); margin-top: 4px;
                         font-style: italic; }
    button.ws-generate-btn { background: var(--ws-accent); color: #fff; border: none;
                              border-radius: var(--ws-radius-md);
                              padding: 9px 20px; font-size: .88rem; cursor: pointer; width: 100%; }
    button.ws-generate-btn:hover { background: var(--ws-accent-hover); }
    button.ws-generate-btn:disabled { background: var(--ws-disabled); cursor: default; }
    #ws-preview-out { margin-top: 12px; background: var(--ws-preview-bg);
                      border: 1px solid var(--ws-accent-border);
                      border-radius: var(--ws-radius-md); padding: 12px;
                      font-size: .85rem; white-space: pre-wrap; display: none; }
    #ws-card-count { font-size: .78rem; color: var(--ws-accent); margin-bottom: 8px; }
  </style>
</head>
<body>
  <header>
    <strong>Workspace</strong>
    <a href="/dashboard">← Dashboard</a>
    <a href="/studio">Studio</a>
    <span class="ws-header-spacer"></span>
    <button class="ws-theme-toggle" id="ws-theme-toggle" type="button" aria-pressed="false" onclick="toggleWorkspaceTheme()">Dark mode</button>
  </header>
  <div class="ws-layout">

    <!-- Left pane: evidence cards -->
    <div class="ws-pane ws-pane-left" id="ws-left-pane">
      <p class="ws-pane-title">Evidence cards</p>
      <div id="ws-card-count"></div>
      <div id="ws-card-list" aria-label="evidence card list">
        <p class="ws-empty">Loading cards…</p>
      </div>
    </div>

    <!-- Right pane: target context, output, coverage, preview -->
    <div class="ws-pane ws-pane-right" id="ws-right-pane">

      <div class="ws-section" id="ws-target-section">
        <h3>Target</h3>
        <div class="ws-field">
          <label for="ws-organization">Organization</label>
          <input id="ws-organization" type="text" placeholder="e.g. Kakao, NinjaLabs" />
        </div>
        <div class="ws-field">
          <label for="ws-role">Role</label>
          <input id="ws-role" type="text" placeholder="e.g. Backend Engineer" />
        </div>
        <div class="ws-field">
          <label for="ws-question">Question / prompt</label>
          <textarea id="ws-question" rows="2" placeholder="e.g. Describe a technical challenge you solved."></textarea>
        </div>
        <div class="ws-field">
          <label for="ws-competency">Competency focus</label>
          <input id="ws-competency" type="text" placeholder="e.g. problem-solving, leadership" />
        </div>
        <div class="ws-field">
          <label for="ws-jd">Job description (optional)</label>
          <textarea id="ws-jd" rows="2" placeholder="Paste relevant JD text…"></textarea>
        </div>
        <div class="ws-output-row" id="ws-output-type">
          <label><input type="radio" name="ws_output_type" value="application_answer" checked /> Application answer</label>
          <label><input type="radio" name="ws_output_type" value="cover_letter" /> Cover letter</label>
        </div>
        <div class="ws-field">
          <label for="ws-charlimit">Char limit</label>
          <input id="ws-charlimit" type="number" min="1" max="5000" placeholder="e.g. 800" />
        </div>
        <label style="font-size:.85rem;display:flex;gap:6px;align-items:center;margin-bottom:10px">
          <input id="ws-blind" type="checkbox" /> Blind hiring
        </label>
      </div>

      <div class="ws-section" id="ws-coverage-section">
        <h3>Coverage</h3>
        <div class="ws-coverage-panel" id="ws-coverage-panel">
          <div class="ws-coverage-label">Themes matched</div>
          <div class="ws-coverage-value" id="ws-coverage-value">—</div>
          <div class="ws-coverage-gap" id="ws-coverage-gap">Select cards and add a target to calculate coverage.</div>
          <div class="ws-coverage-terms" id="ws-coverage-terms"></div>
        </div>
      </div>

      <div class="ws-section" id="ws-preview-section">
        <h3>Preview</h3>
        <button class="ws-generate-btn" id="ws-generate-btn" onclick="generateWorkspacePreview()">Generate preview</button>
        <pre id="ws-preview-out"></pre>
      </div>

    </div>
  </div>
  <script src="/static/workspace.js"></script>
</body>
</html>
